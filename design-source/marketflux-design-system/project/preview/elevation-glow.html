<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">ELEVATION · BORDERS, NOT SHADOWS</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div style="text-align:center">
      <div style="background:#15130F;border:1px solid var(--border);padding:16px;font-family:var(--font-mono);font-size:10px;color:var(--fg-secondary);letter-spacing:0.08em">CARD</div>
      <div class="mf-mono" style="font-size:10px;margin-top:6px;color:var(--fg-tertiary)">1px border</div>
    </div>
    <div style="text-align:center">
      <div style="background:#15130F;border:1px solid rgba(34,197,94,0.4);padding:16px;font-family:var(--font-mono);font-size:10px;color:#4ADE80;letter-spacing:0.08em">HOVER</div>
      <div class="mf-mono" style="font-size:10px;margin-top:6px;color:var(--fg-tertiary)">border → primary/40</div>
    </div>
    <div style="text-align:center">
      <div style="background:#15130F;border:1px solid #4ADE80;padding:16px;font-family:var(--font-mono);font-size:10px;color:#4ADE80;letter-spacing:0.08em;box-shadow:0 0 16px rgba(34,197,94,0.28)">ACTIVE</div>
      <div class="mf-mono" style="font-size:10px;margin-top:6px;color:var(--fg-tertiary)">+ glow‑green</div>
    </div>
    <div style="text-align:center">
      <div style="background:#15130F;border:1px solid var(--border);padding:16px;font-family:var(--font-mono);font-size:10px;color:var(--fg-primary);letter-spacing:0.08em;box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 16px 48px rgba(0,0,0,0.42)">MODAL</div>
      <div class="mf-mono" style="font-size:10px;margin-top:6px;color:var(--fg-tertiary)">elev (rare)</div>
    </div>
  </div>
</div>
</body></html>
