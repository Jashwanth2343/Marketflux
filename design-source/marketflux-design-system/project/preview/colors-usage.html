<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">SEMANTIC USAGE IN CONTEXT</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
    <div class="mf-card" style="padding:10px 12px;border-radius:var(--radius-2)">
      <div class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.08em">NVDA</div>
      <div class="mf-data-m" style="margin-top:2px">$1,182.40</div>
      <div class="mf-data-s mf-bull">▲ +24.18 (+2.09%)</div>
    </div>
    <div class="mf-card" style="padding:10px 12px;border-radius:var(--radius-2)">
      <div class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.08em">AMZN</div>
      <div class="mf-data-m" style="margin-top:2px">$185.22</div>
      <div class="mf-data-s mf-bear">▼ −1.93 (−1.03%)</div>
    </div>
    <div class="mf-card" style="padding:10px 12px;border-radius:var(--radius-2)">
      <div class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.08em">VIX</div>
      <div class="mf-data-m" style="margin-top:2px">29.49</div>
      <div class="mf-data-s mf-warn">● NEUTRAL</div>
    </div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:2px">
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.12em;padding:3px 10px;border-radius:var(--radius-full);color:#4ADE80;background:rgba(34,197,94,0.10);border:1px solid rgba(34,197,94,0.32)">BULLISH</span>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.12em;padding:3px 10px;border-radius:var(--radius-full);color:#EF4444;background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.32)">BEARISH</span>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.12em;padding:3px 10px;border-radius:var(--radius-full);color:#F5C147;background:rgba(245,193,71,0.10);border:1px solid rgba(245,193,71,0.32)">NEUTRAL</span>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.12em;padding:3px 10px;border-radius:var(--radius-full);color:#22C55E;background:rgba(34,197,94,0.10);border:1px solid rgba(34,197,94,0.32)">AI INSIGHT</span>
  </div>
</div>
</body></html>
