<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; justify-content: center; min-height: 100%; box-sizing: border-box; }
  .row { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
  .size { text-align: center; }
  .size img { display: block; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); margin-top: 8px; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="card">
  <div class="mf-micro">MARK · APP ICON · FAVICON</div>
  <div class="row">
    <div class="size"><img src="../assets/logo-mark.svg" width="128" height="128" alt=""><div class="lbl">128 · marketing</div></div>
    <div class="size"><img src="../assets/logo-mark.svg" width="80"  height="80"  alt=""><div class="lbl">80 · default</div></div>
    <div class="size"><img src="../assets/logo-mark.svg" width="48"  height="48"  alt=""><div class="lbl">48 · app icon</div></div>
    <div class="size"><img src="../assets/logo-mark.svg" width="32"  height="32"  alt=""><div class="lbl">32 · nav</div></div>
    <div class="size"><img src="../assets/logo-mark.svg" width="20"  height="20"  alt=""><div class="lbl">20 · inline</div></div>
    <div class="size"><img src="../assets/logo-mark.svg" width="16"  height="16"  alt=""><div class="lbl">16 · favicon</div></div>
  </div>
</div>
</body></html>
