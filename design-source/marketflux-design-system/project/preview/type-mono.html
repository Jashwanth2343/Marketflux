<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; min-height: 100%; box-sizing: border-box; justify-content: center; }
  .row { display: flex; align-items: baseline; gap: 28px; flex-wrap: wrap; }
  .px { font-family: var(--font-mono); font-size: 36px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; color: var(--fg-primary); line-height: 1; }
  .delta { font-family: var(--font-mono); font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .table { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
  .cell .k { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-secondary); }
  .cell .v { font-family: var(--font-mono); font-size: 16px; margin-top: 2px; font-variant-numeric: tabular-nums; color: var(--fg-primary); }
</style>
</head>
<body>
<div class="card">
  <div class="mf-micro">MONO &amp; DATA · JETBRAINS MONO · TABULAR-NUMS</div>
  <div class="row">
    <span style="font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-0.015em">AAPL</span>
    <span class="px">$192.35</span>
    <span class="delta mf-bull">+3.94 &nbsp;·&nbsp; +2.09%</span>
  </div>
  <div class="table">
    <div class="cell"><div class="k">Volume</div><div class="v">24.8M</div></div>
    <div class="cell"><div class="k">Market cap</div><div class="v">$3.02T</div></div>
    <div class="cell"><div class="k">P/E (fwd)</div><div class="v">28.2</div></div>
    <div class="cell"><div class="k">52w range</div><div class="v">164 – 199</div></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);letter-spacing:0.06em">
    Every number renders with tabular numerals so columns align without manual width.
  </div>
</div>
</body></html>
