<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">METRIC CARDS · WITH SPARKLINES</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div class="mf-card" style="padding:10px 12px">
      <div class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.10em">NVDA</div>
      <div class="mf-data-m" style="margin-top:2px">1,182.40</div>
      <svg viewBox="0 0 120 28" width="100%" height="22" preserveAspectRatio="none" style="margin-top:4px"><polyline fill="none" stroke="#4ADE80" stroke-width="1.5" points="0,22 12,18 24,20 36,14 48,16 60,10 72,12 84,8 96,10 108,6 120,4"/></svg>
      <div class="mf-mono mf-bull" style="font-size:11px;margin-top:2px">+2.09%</div>
    </div>
    <div class="mf-card" style="padding:10px 12px">
      <div class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.10em">TSLA</div>
      <div class="mf-data-m" style="margin-top:2px">182.04</div>
      <svg viewBox="0 0 120 28" width="100%" height="22" preserveAspectRatio="none" style="margin-top:4px"><polyline fill="none" stroke="#EF4444" stroke-width="1.5" points="0,6 12,8 24,10 36,12 48,11 60,16 72,15 84,20 96,18 108,24 120,22"/></svg>
      <div class="mf-mono mf-bear" style="font-size:11px;margin-top:2px">−1.32%</div>
    </div>
    <div class="mf-card" style="padding:10px 12px">
      <div class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.10em">MSFT</div>
      <div class="mf-data-m" style="margin-top:2px">412.66</div>
      <svg viewBox="0 0 120 28" width="100%" height="22" preserveAspectRatio="none" style="margin-top:4px"><polyline fill="none" stroke="#A8A091" stroke-width="1.5" points="0,12 12,14 24,11 36,13 48,12 60,14 72,11 84,13 96,12 108,11 120,12"/></svg>
      <div class="mf-mono mf-cyan" style="font-size:11px;margin-top:2px">+0.04%</div>
    </div>
    <div class="mf-card" style="padding:10px 12px;border-color:rgba(34,197,94,0.32)">
      <div class="mf-mono" style="font-size:10px;color:#22C55E;letter-spacing:0.10em">◆ AI TGT</div>
      <div class="mf-data-m" style="margin-top:2px">$210.00</div>
      <svg viewBox="0 0 120 28" width="100%" height="22" preserveAspectRatio="none" style="margin-top:4px"><polyline fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="3 2" points="0,20 12,18 24,16 36,14 48,12 60,10 72,8 84,6 96,5 108,4 120,3"/></svg>
      <div class="mf-mono mf-agent" style="font-size:11px;margin-top:2px">84% conf.</div>
    </div>
  </div>
</div>
</body></html>
