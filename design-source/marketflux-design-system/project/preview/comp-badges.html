<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  .b { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border: 1px solid; display: inline-flex; align-items: center; gap: 5px; line-height: 1.2; }
</style>
</head>
<body>
<div class="card">
  <div class="mf-micro">BADGES &amp; CHIPS</div>
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <span class="b" style="color:#4ADE80;background:rgba(34,197,94,0.10);border-color:rgba(34,197,94,0.32)">BULLISH</span>
    <span class="b" style="color:#EF4444;background:rgba(239,68,68,0.10);border-color:rgba(239,68,68,0.32)">BEARISH</span>
    <span class="b" style="color:#F5C147;background:rgba(245,193,71,0.10);border-color:rgba(245,193,71,0.32)">NEUTRAL</span>
    <span class="b" style="color:#22C55E;background:rgba(34,197,94,0.10);border-color:rgba(34,197,94,0.32)">◆ AI INSIGHT</span>
    <span class="b" style="color:#A8A091;background:rgba(168,160,145,0.10);border-color:rgba(168,160,145,0.32)">VOL ↑</span>
    <span class="b" style="color:var(--fg-secondary);background:transparent;border-color:var(--border)">DRAFT</span>
  </div>
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <span class="b" style="color:#4ADE80;background:rgba(34,197,94,0.10);border-color:rgba(34,197,94,0.32)"><span style="display:inline-block;width:6px;height:6px;background:#4ADE80;border-radius:9999px"></span>MARKET OPEN</span>
    <span class="b" style="color:var(--fg-secondary);background:transparent;border-color:var(--border)">MARKET CLOSED</span>
    <span class="b" style="color:#22C55E;background:rgba(34,197,94,0.10);border-color:rgba(34,197,94,0.32)">PRO</span>
    <span class="b" style="color:#F5C147;background:rgba(245,193,71,0.10);border-color:rgba(245,193,71,0.32)">EARNINGS WK</span>
    <span class="b" style="background:#4ADE80;color:#050608;border-color:#4ADE80">SOLID · LIVE</span>
  </div>
  <div class="row" style="gap:8px">
    <span class="b" style="color:#F0EAD9;background:#1E1B15;border-color:var(--border);padding:4px 9px">AAPL</span>
    <span class="b" style="color:#F0EAD9;background:#1E1B15;border-color:var(--border);padding:4px 9px">NVDA</span>
    <span class="b" style="color:#F0EAD9;background:#1E1B15;border-color:var(--border);padding:4px 9px">MSFT</span>
    <span class="b" style="color:var(--fg-tertiary);background:#1E1B15;border-color:var(--border);padding:4px 9px">+ 24</span>
  </div>
</div>
</body></html>
