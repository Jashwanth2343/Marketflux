<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">CARD ANATOMY · HERO + DEFAULT</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="mf-card is-hero">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.10em">TOTAL PORTFOLIO</span>
        <span class="mf-mono mf-bull" style="font-size:10px">+1.84%</span>
      </div>
      <div class="mf-data-l" style="font-size:24px">$1,248,500.22</div>
      <div class="mf-mono mf-muted" style="font-size:10px;margin-top:4px">↑ $22,840 today</div>
    </div>
    <div class="mf-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span class="mf-mono" style="font-size:10px;color:var(--fg-secondary);letter-spacing:0.10em">S&amp;P 500</span>
        <span class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">14:32 UTC</span>
      </div>
      <div class="mf-data-l" style="font-size:24px">5,892.40</div>
      <div class="mf-mono mf-bull" style="font-size:11px;margin-top:4px">+38.21 (+0.65%)</div>
    </div>
  </div>
  <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary);letter-spacing:0.08em">HERO = CORNER BRACKETS · DEFAULT = HAIRLINE ONLY</div>
</div>
</body></html>
