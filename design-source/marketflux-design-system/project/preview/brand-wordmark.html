<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { padding: 28px 32px; display: flex; flex-direction: column; gap: 22px; justify-content: center; min-height: 100%; box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 36px; flex-wrap: wrap; }
  .lock { display: flex; align-items: center; gap: 14px; }
  .lock img { display: block; }
  .wd { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.015em; color: var(--fg-primary); line-height: 1; }
  .wd em { color: var(--bull-strong); font-style: normal; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.06em; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="mf-micro">WORDMARK · MARKETFLUX</div>
  <div class="row">
    <div class="lock">
      <img src="../assets/logo-mark.svg" width="48" height="48" alt="">
      <div>
        <div class="wd" style="font-size:28px">Market<em>Flux</em></div>
        <div class="lbl">48 · primary lockup</div>
      </div>
    </div>
    <div class="lock">
      <img src="../assets/logo-mark.svg" width="32" height="32" alt="">
      <div>
        <div class="wd" style="font-size:20px">Market<em>Flux</em></div>
        <div class="lbl">32 · nav</div>
      </div>
    </div>
    <div class="lock">
      <img src="../assets/logo-mark.svg" width="20" height="20" alt="">
      <div>
        <div class="wd" style="font-size:14px">Market<em>Flux</em></div>
        <div class="lbl">20 · inline</div>
      </div>
    </div>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);letter-spacing:0.04em">
    DM SANS 600 · TRACKING −0.015EM · "FLUX" IN <span style="color:var(--bull-strong)">BRAND&nbsp;GREEN</span>
  </div>
</div>
</body></html>
