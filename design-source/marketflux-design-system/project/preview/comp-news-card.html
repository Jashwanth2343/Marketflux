<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">News card · with sentiment</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    <!-- Card with sparkline thumbnail -->
    <div style="border:1px solid var(--border);background:var(--bg-surface);
                border-radius:var(--radius-2);overflow:hidden;
                display:flex;flex-direction:column">
      <div style="height:96px;background:linear-gradient(135deg,#1a2230,#0a0e14);
                  position:relative;border-bottom:1px solid var(--border)">
        <svg viewBox="0 0 300 96" width="100%" height="100%" preserveAspectRatio="none">
          <polyline fill="none" stroke="#4ADE80" stroke-width="1.5"
                    points="0,80 30,68 60,72 90,52 120,58 150,42 180,46 210,32 240,38 270,20 300,28"/>
          <polyline fill="rgba(34,197,94,0.08)" stroke="none"
                    points="0,80 30,68 60,72 90,52 120,58 150,42 180,46 210,32 240,38 270,20 300,28 300,96 0,96"/>
        </svg>
        <span style="position:absolute;top:8px;right:8px;
                     font-family:var(--font-mono);font-size:9px;font-weight:600;
                     letter-spacing:0.12em;padding:3px 9px;
                     border-radius:var(--radius-full);
                     color:#4ADE80;background:rgba(0,0,0,0.7);
                     border:1px solid rgba(34,197,94,0.4)">BULLISH</span>
      </div>
      <div style="padding:12px 14px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;gap:5px">
          <span style="font-family:var(--font-mono);font-size:9.5px;font-weight:700;
                       padding:2px 8px;border-radius:var(--radius-full);
                       color:#4ADE80;background:rgba(34,197,94,0.10);
                       border:1px solid rgba(34,197,94,0.32)">NVDA</span>
          <span style="font-family:var(--font-mono);font-size:9.5px;font-weight:700;
                       padding:2px 8px;border-radius:var(--radius-full);
                       color:#4ADE80;background:rgba(34,197,94,0.10);
                       border:1px solid rgba(34,197,94,0.32)">AAPL</span>
        </div>
        <p style="margin:0;font-size:13px;line-height:1.4;color:var(--fg-primary);font-weight:500;text-wrap:pretty">
          Nvidia beats on Q3 earnings, raises forward guidance on AI chip demand
        </p>
        <div style="display:flex;justify-content:space-between;
                    font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary)">
          <span>Reuters</span><span>2m ago</span>
        </div>
      </div>
    </div>

    <!-- Compact bearish card -->
    <div style="border:1px solid var(--border);background:var(--bg-surface);
                border-radius:var(--radius-2);padding:14px;
                display:flex;flex-direction:column;gap:8px;justify-content:center">
      <div style="display:flex;gap:5px;align-items:center">
        <span style="font-family:var(--font-mono);font-size:9.5px;font-weight:700;
                     padding:2px 8px;border-radius:var(--radius-full);
                     color:#EF4444;background:rgba(239,68,68,0.10);
                     border:1px solid rgba(239,68,68,0.32)">TSLA</span>
        <span style="font-family:var(--font-mono);font-size:9.5px;font-weight:600;
                     letter-spacing:0.12em;padding:2px 9px;border-radius:var(--radius-full);
                     color:#EF4444;background:rgba(239,68,68,0.10);
                     border:1px solid rgba(239,68,68,0.32);margin-left:auto">BEARISH</span>
      </div>
      <p style="margin:0;font-size:13px;line-height:1.4;color:var(--fg-primary);font-weight:500;text-wrap:pretty">
        Tesla delivery numbers miss analyst estimates for third consecutive quarter
      </p>
      <div style="display:flex;justify-content:space-between;
                  font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary)">
        <span>Bloomberg</span><span>14m ago</span>
      </div>
    </div>

  </div>
</div>
</body></html>
