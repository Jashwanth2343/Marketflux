<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">RADIUS · RATIONED · SHARP</div>
  <div style="display:flex;gap:24px;align-items:flex-end">
    <div style="text-align:center">
      <div style="width:72px;height:54px;background:#15130F;border:1px solid #4ADE80;border-radius:0"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">radius‑0</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">0px · default</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:54px;background:#15130F;border:1px solid #4ADE80;border-radius:2px"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">radius‑1</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">2px · cards</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:54px;background:#15130F;border:1px solid #4ADE80;border-radius:4px"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">radius‑2</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">4px · badges</div>
    </div>
    <div style="text-align:center">
      <div style="width:54px;height:54px;background:#15130F;border:1px solid #4ADE80;border-radius:9999px;margin:0 9px"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">radius‑full</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">9999px · dots</div>
    </div>
    <div style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--bear);letter-spacing:0.08em;line-height:1.5;text-align:right">
      DO NOT USE<br/><span style="color:var(--fg-tertiary)">rounded‑lg / xl / 2xl</span>
    </div>
  </div>
</div>
</body></html>
