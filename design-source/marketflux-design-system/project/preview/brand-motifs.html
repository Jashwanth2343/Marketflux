<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-canvas); }
  .card { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; min-height: 100%; box-sizing: border-box; justify-content: center; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; height: 140px; }
  .tile { position: relative; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-2); overflow: hidden; padding: 12px 14px; display: flex; flex-direction: column; justify-content: flex-end; }
  .tile .l { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
  .tile .d { font-size: 12px; color: var(--fg-primary); margin-top: 2px; line-height: 1.4; }
</style>
</head>
<body>
<div class="card">
  <div class="mf-micro">VISUAL MOTIFS · CALM, EDITORIAL, FINANCE</div>
  <div class="grid">
    <div class="tile">
      <!-- subtle dot pattern bg -->
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.35" preserveAspectRatio="xMidYMid slice">
        <defs><pattern id="dots1" width="14" height="14" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1" fill="#F0EAD9" opacity="0.18"/>
        </pattern></defs>
        <rect width="100%" height="100%" fill="url(#dots1)"/>
      </svg>
      <span class="l">Dot grid</span>
      <span class="d">Light-paper texture, used in empty states.</span>
    </div>
    <div class="tile">
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.65" preserveAspectRatio="none" viewBox="0 0 300 140">
        <path d="M 0,100 L 30,90 L 60,82 L 90,70 L 120,76 L 150,60 L 180,66 L 210,48 L 240,40 L 270,30 L 300,20 L 300,140 L 0,140 Z"
              fill="rgba(34, 197, 94, 0.18)"/>
        <polyline fill="none" stroke="#22C55E" stroke-width="1.8" stroke-linejoin="round"
          points="0,100 30,90 60,82 90,70 120,76 150,60 180,66 210,48 240,40 270,30 300,20"/>
      </svg>
      <span class="l">Area chart</span>
      <span class="d">Signature MarketFlux moment — green line on cream-tinted dark.</span>
    </div>
    <div class="tile" style="background:var(--paper);color:var(--ink)">
      <span class="l" style="color:#75705F">Cream paper</span>
      <span class="d" style="color:#0C0B09">Inverted surface for marketing, share cards, exports.</span>
    </div>
  </div>
</div>
</body></html>
