<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="mf-micro">SURFACES · NEUTRAL DARK</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
    <div>
      <div style="height:64px;background:#0C0B09;border:1px solid var(--border);border-radius:var(--radius-2)"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">Canvas</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">#0C0B09</div>
    </div>
    <div>
      <div style="height:64px;background:#15130F;border:1px solid var(--border);border-radius:var(--radius-2)"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">Surface</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">#15130F</div>
    </div>
    <div>
      <div style="height:64px;background:#1E1B15;border:1px solid var(--border);border-radius:var(--radius-2)"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">Surface‑2</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">#1E1B15</div>
    </div>
    <div>
      <div style="height:64px;background:#29251D;border:1px solid var(--border);border-radius:var(--radius-2)"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">Surface‑3</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">#29251D</div>
    </div>
    <div>
      <div style="height:64px;background:#29251D;border-radius:var(--radius-2)"></div>
      <div class="mf-mono" style="font-size:11px;margin-top:6px;color:var(--fg-primary)">Border</div>
      <div class="mf-mono" style="font-size:10px;color:var(--fg-tertiary)">#29251D</div>
    </div>
  </div>
</div>
</body></html>
