<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .ico { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; }
  .ico svg { width: 20px; height: 20px; stroke: var(--fg-primary); stroke-width: 1.75; }
  .ico .l { font-family: var(--font-mono); font-size: 9px; color: var(--fg-tertiary); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="mf-micro">ICONOGRAPHY · LUCIDE · 1.75 STROKE</div>
  <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px">
    <div class="ico"><i data-lucide="activity"></i><span class="l">activity</span></div>
    <div class="ico"><i data-lucide="layout-dashboard"></i><span class="l">dashboard</span></div>
    <div class="ico"><i data-lucide="newspaper"></i><span class="l">news</span></div>
    <div class="ico"><i data-lucide="search"></i><span class="l">screener</span></div>
    <div class="ico"><i data-lucide="brain"></i><span class="l">research</span></div>
    <div class="ico"><i data-lucide="globe"></i><span class="l">macro</span></div>
    <div class="ico"><i data-lucide="shield"></i><span class="l">risk</span></div>
    <div class="ico"><i data-lucide="briefcase"></i><span class="l">portfolio</span></div>
    <div class="ico"><i data-lucide="book-open-text"></i><span class="l">theses</span></div>
    <div class="ico"><i data-lucide="terminal-square"></i><span class="l">fund os</span></div>
    <div class="ico"><i data-lucide="trending-up"></i><span class="l">up</span></div>
    <div class="ico"><i data-lucide="trending-down"></i><span class="l">down</span></div>
    <div class="ico"><i data-lucide="bar-chart-2"></i><span class="l">chart</span></div>
    <div class="ico"><i data-lucide="map"></i><span class="l">heatmap</span></div>
    <div class="ico"><i data-lucide="sparkles" style="stroke:var(--agent-strong)"></i><span class="l" style="color:var(--agent-strong)">AI</span></div>
    <div class="ico"><i data-lucide="message-square"></i><span class="l">chat</span></div>
    <div class="ico"><i data-lucide="send"></i><span class="l">send</span></div>
    <div class="ico"><i data-lucide="external-link"></i><span class="l">extern</span></div>
    <div class="ico"><i data-lucide="bell"></i><span class="l">alert</span></div>
    <div class="ico"><i data-lucide="settings"></i><span class="l">settings</span></div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
