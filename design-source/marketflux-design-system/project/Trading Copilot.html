<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketFlux · Trading Copilot</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />

  <style>
    html, body { margin:0; padding:0; background: var(--bg-canvas); color: var(--fg-primary); overflow-x: hidden; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: var(--font-body); }

    /* Reusable atoms */
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .micro { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-tertiary); }
    .kicker { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-tertiary); }
    .hairline { background: linear-gradient(90deg, transparent, var(--border), transparent); height: 1px; }

    /* Cursor blink */
    .caret { display: inline-block; width: 7px; height: 1.05em; background: var(--bull-strong); margin-left: 3px; vertical-align: -2px; animation: caret 1.05s steps(2) infinite; box-shadow: 0 0 8px var(--bull-strong); }
    @keyframes caret { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    /* Live pulse dot */
    .live-dot { width: 7px; height: 7px; border-radius: 9999px; background: var(--bull-strong); box-shadow: 0 0 6px var(--bull-strong); animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

    /* Streaming log fades */
    .log-row { opacity: 0; transform: translateY(4px); animation: logIn 360ms cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes logIn { to { opacity: 1; transform: translateY(0); } }

    /* Flash highlights for numbers */
    .flash-up { animation: flashUp 900ms ease-out; }
    .flash-dn { animation: flashDn 900ms ease-out; }
    @keyframes flashUp { 0%{background: rgba(34,197,94,0.32)} 100%{background: transparent} }
    @keyframes flashDn { 0%{background: rgba(239,68,68,0.32)} 100%{background: transparent} }

    /* Sweep glow across pipeline */
    @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(120%); } }

    /* Chart draw-in */
    .chart-path { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: draw 1400ms cubic-bezier(0.22,1,0.36,1) 200ms forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    /* Subtle grid wash for idle hero */
    .grid-bg {
      background-image:
        radial-gradient(circle at 50% 50%, rgba(34,197,94,0.06), transparent 60%),
        linear-gradient(var(--border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px, 28px 28px;
      background-position: 0 0, -1px -1px, -1px -1px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 100%);
    }

    /* Orb breathing */
    .orb { animation: breathe 4.2s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(74,222,128,0.32)); }
      50%      { transform: scale(1.04); filter: drop-shadow(0 0 32px rgba(74,222,128,0.55)); }
    }

    /* Ticker scroll */
    .ticker-track { animation: tk 60s linear infinite; }
    @keyframes tk { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* Phase glow active */
    .phase-active .phase-node { box-shadow: 0 0 0 1px var(--bull-strong), 0 0 18px rgba(74,222,128,0.55); }
    .phase-active .phase-label { color: var(--bull-strong); }

    /* Pipeline connector progress */
    .conn { position: relative; height: 1px; background: var(--border); flex: 1; }
    .conn::after { content:''; position:absolute; inset: 0 100% 0 0; background: var(--bull-strong); box-shadow: 0 0 8px var(--bull-strong); transition: right 600ms cubic-bezier(0.22,1,0.36,1); }
    .conn.done::after { right: 0; }

    /* Slide-up entry for proposal */
    .slide-up { opacity: 0; transform: translateY(12px); animation: slideUp 480ms cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* Stage waveform */
    .wave { display: inline-flex; align-items: center; gap: 2px; height: 14px; }
    .wave span { display:inline-block; width: 2px; background: var(--bull-strong); border-radius: 2px; animation: waveB 1.1s ease-in-out infinite; }
    .wave span:nth-child(1){ animation-delay: 0ms; }
    .wave span:nth-child(2){ animation-delay: 90ms; }
    .wave span:nth-child(3){ animation-delay: 180ms; }
    .wave span:nth-child(4){ animation-delay: 270ms; }
    .wave span:nth-child(5){ animation-delay: 360ms; }
    @keyframes waveB { 0%, 100% { height: 4px; } 50% { height: 14px; } }

    /* Focus ring */
    button:focus-visible, input:focus-visible { outline: 2px solid var(--bull-strong); outline-offset: 2px; }
    button { font-family: inherit; }

    /* Scrollbar inside log */
    .log-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .log-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }
    .log-scroll::-webkit-scrollbar-track { background: transparent; }

    /* Hover ghost on prompt cards */
    .prompt-card:hover { border-color: var(--bull-border) !important; background: var(--bull-bg) !important; }
    .prompt-card:hover .prompt-kbd { color: var(--bull-strong) !important; border-color: var(--bull-border) !important; }

    /* Hover lift on tool chip */
    .tool-chip { animation: chipIn 320ms cubic-bezier(0.22,1,0.36,1); }
    @keyframes chipIn { from { opacity: 0; transform: translateY(-3px) scale(0.96); } to { opacity: 1; transform: none; } }

    /* Confidence bar fill */
    .conf-fill { transform-origin: left; transform: scaleX(0); animation: fillX 900ms cubic-bezier(0.22,1,0.36,1) 600ms forwards; }
    @keyframes fillX { to { transform: scaleX(1); } }
  </style>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="copilot-chrome.jsx"></script>
  <script type="text/babel" src="copilot-canvas.jsx"></script>
  <script type="text/babel" src="copilot-app.jsx"></script>
</body>
</html>
