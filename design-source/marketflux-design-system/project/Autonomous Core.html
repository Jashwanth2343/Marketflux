<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketFlux · Autonomous Core</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />

  <style>
    /* ============================================================
       AUTONOMOUS CORE — matched to the MarketFlux design system
       Direction: agent studio × editorial finance (Fey / Coinbase
       / Robinhood), warm cream-on-ink, one confident bull green,
       NO neon, NO mint→lime, NO ambient blobs.
       Surfaces use .mf-glass / .mf-glass-hi from the DS where the
       chrome floats over the dot grid.
       ============================================================ */

    :root {
      /* Map this file's local vars onto design-system tokens so the
         JSX (which references --glass / --hairline / --agent-grad)
         lands on the cream-ink palette without rewriting every node. */
      --glass:         rgba(21, 19, 15, 0.55);          /* mirrors .mf-glass body */
      --glass-strong:  rgba(21, 19, 15, 0.74);          /* sticky chrome */
      --hairline:      rgba(244, 239, 227, 0.10);       /* DS glass border */
      --hairline-soft: var(--border-subtle);            /* DS token */

      /* "Agent" gradient retuned to a single confident bull green —
         a subtle bull-strong → bull lift, no mint, no lime. */
      --agent-grad:    linear-gradient(135deg, var(--bull-strong) 0%, var(--bull) 100%);
      --agent-grad-ink:#082B14;                          /* deep bull ink, for text on the gradient */

      --display:       var(--font-display);
      --serif:         var(--font-serif);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      background: var(--bg-canvas);
      color: var(--fg-primary);
      font-family: var(--display);
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Dot-grid canvas background — large, soft, vignetted */
    .dotgrid {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle, rgba(244,239,227,0.085) 1.1px, transparent 1.4px);
      background-size: 26px 26px;
      background-position: 0 0;
      mask-image: radial-gradient(ellipse 95% 85% at 50% 50%, #000 30%, transparent 100%);
      pointer-events: none;
    }
    .dotgrid-dense { background-size: 18px 18px; }
    .dotgrid-loose { background-size: 36px 36px; }

    /* Ambient glow blobs removed — DS rule: "No textures, no grain,
       no patterns. Restraint is the brand." Kept as a no-op so the
       JSX node still mounts cleanly. */
    .ambient { display: none; }

    /* Glass panel base — matches the design-system .mf-glass recipe
       (blur 28 / sat 160, cream rim light, no shadow glow) but kept
       on local class names because the chrome JSX uses them. */
    .glass {
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.06) 0%,
          rgba(255,255,255,0.02) 45%,
          rgba(255,255,255,0.04) 100%
        ),
        var(--glass);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-3);  /* 12px — DS hero/panel max */
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.30),
        0 18px 54px rgba(0,0,0,0.40);
    }
    .glass-strong {
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.06) 0%,
          rgba(255,255,255,0.02) 45%,
          rgba(255,255,255,0.04) 100%
        ),
        var(--glass-strong);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
    }

    /* Atoms */
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .kicker {
      font-family: var(--font-mono);
      font-size: 10.5px; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--fg-tertiary);
    }
    .micro {
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--fg-tertiary);
    }

    /* Agent gradient orb / chip — single bull-green moment */
    .agent-orb {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.4) 0%, transparent 35%),
        var(--agent-grad);
      border-radius: 50%;
      box-shadow:
        0 0 0 1px var(--bull-border),
        0 0 14px rgba(34,197,94,0.30),
        inset 0 0 10px rgba(255,255,255,0.15);
    }
    .agent-chip {
      background: var(--agent-grad);
      color: var(--agent-grad-ink);
    }

    /* Live pulse — DS mf-live-dot, calmer cadence */
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 9999px;
      background: var(--bull);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 4px rgba(34,197,94,0.55); }
      50%      { opacity: 0.6; box-shadow: 0 0 12px rgba(34,197,94,0.85); }
    }

    /* Card on canvas — DS surface, 12px radius, no breathing glow */
    .artifact {
      position: absolute;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-3);  /* 12px — DS hero card max */
      box-shadow: var(--shadow-soft);
      transition:
        border-color var(--duration-base) var(--ease-out),
        transform var(--duration-base) var(--ease-out),
        box-shadow var(--duration-base) var(--ease-out);
      will-change: transform;
      display: flex; flex-direction: column;
    }
    .artifact:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    /* The single "live" moment — static subtle bull frame, no animation */
    .artifact-live {
      border-color: var(--bull-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.02),
        0 0 0 1px rgba(34,197,94,0.10),
        var(--shadow-glow),
        var(--shadow-soft);
    }

    .artifact-head {
      display: flex; align-items: center; gap: 10px;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .artifact-body { padding: var(--space-4); }

    /* Edge connectors svg layer */
    .edges {
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .edge {
      fill: none;
      stroke: var(--border-strong);
      stroke-width: 1.25;
      stroke-dasharray: 4 4;
    }
    .edge-live {
      stroke: var(--bull);
      stroke-dasharray: 6 4;
      animation: dash 1.6s linear infinite;
      opacity: 0.7;
    }
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .edge-dot { fill: var(--fg-tertiary); }
    .edge-dot-live { fill: var(--bull); }

    /* Buttons — DS radius-2 (8px) */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 12px; border-radius: var(--radius-2);
      font-size: 12.5px; font-weight: 500; font-family: inherit;
      color: var(--fg-primary);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .btn:hover { border-color: var(--border-strong); background: var(--bg-surface-2); }
    .btn-primary {
      background: var(--bull);
      color: var(--fg-inverse);
      border: 0;
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--bull-strong); }
    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius-2);
      color: var(--fg-secondary); cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .btn-icon:hover { border-color: var(--border-strong); color: var(--fg-primary); background: var(--bg-surface-2); }

    /* Chip — pill from DS */
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: var(--radius-full);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      font-size: 11.5px; color: var(--fg-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .chip:hover { border-color: var(--bull-border); color: var(--fg-primary); background: var(--bull-bg); }
    .chip-num {
      margin-left: 4px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--fg-tertiary);
      background: var(--bg-surface-2);
      border-radius: var(--radius-1);
      padding: 1px 5px;
    }

    /* Streaming log row */
    .log-row { opacity: 0; transform: translateY(3px); animation: logIn 360ms cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes logIn { to { opacity: 1; transform: translateY(0); } }

    /* Mini sparkline draw-in */
    .draw {
      stroke-dasharray: 1000; stroke-dashoffset: 1000;
      animation: draw 1600ms cubic-bezier(0.22,1,0.36,1) 200ms forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    /* Slide up fade */
    .slide-up { opacity: 0; transform: translateY(8px); animation: slideUp 480ms cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    /* Caret */
    .caret {
      display: inline-block; width: 6px; height: 1em;
      background: var(--bull); margin-left: 3px; vertical-align: -2px;
      animation: blink 1s steps(2) infinite;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 9999px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Focus — DS spec: 2px bull, 2px offset */
    button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--bull); outline-offset: 2px;
    }

    /* Suggestion chip enter */
    .chip-enter { animation: chipIn 320ms cubic-bezier(0.22,1,0.36,1) backwards; }
    @keyframes chipIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* Sweep highlight */
    @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(120%); } }
    .sweep-mask { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .sweep-mask::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(34,197,94,0.18), transparent);
      animation: sweep 2.4s linear infinite;
    }

    /* Heatmap cell */
    .heat-cell { border-radius: 4px; transition: transform 140ms ease-out; }
    .heat-cell:hover { transform: scale(1.08); }

    /* Tab underline shifting */
    .tab-active::after {
      content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px;
      height: 2px; background: var(--agent-grad); border-radius: 2px;
    }

    /* Drag affordance */
    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }

    /* No-select on canvas controls */
    .no-select { user-select: none; -webkit-user-select: none; }
  </style>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Source of truth lives in the JSX files below. Load order matters:
       1. tweaks-panel  → useTweaks + TweaksPanel + Tweak* controls
       2. core-chrome   → Icon + TopBar + LeftRail + ToolPalette + BottomPrompt + AgentLogFooter
       3. core-canvas   → Canvas + CARD_LAYOUT + all artifact cards (uses Icon)
       4. core-app      → App orchestrator + ReactDOM render -->
  <script type="text/babel" data-presets="env,react" src="tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="core-chrome.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="core-canvas.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="core-app.jsx"></script>
</body>
</html>
