name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarketFlux/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run backend unit tests
        run: |
          python -m pytest -q \
            tests/test_thesis_router_unittest.py \
            tests/test_policy_engine_unittest.py \
            tests/test_thesis_backfill_unittest.py \
            tests/test_conviction_ledger.py \
            tests/test_sec_filings.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarketFlux/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: MarketFlux/frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build
