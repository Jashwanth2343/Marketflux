# MarketFlux - local/production compose
# Supabase is the primary external data/auth layer. Optional legacy Mongo
# fallback code may still exist in the backend, but compose does not start it.

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      - PORT=${PORT:-8000}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

# Optional: use local Redis if REDIS_HOST not set to external
#  redis:
#    image: redis:7-alpine
#    ports:
#      - "6379:6379"
