version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: marketflux-postgres
    environment:
      POSTGRES_DB: marketflux
      POSTGRES_USER: marketflux
      POSTGRES_PASSWORD: marketflux
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/vnext_pgvector_schema.sql:/docker-entrypoint-initdb.d/01-vnext-schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: marketflux-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
